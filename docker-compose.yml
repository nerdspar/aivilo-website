# Aivilo website — deployment stack for TrueNAS SCALE (Custom App → install via YAML)
#
#   web         the static site, served by nginx on :8080 (non-root)
#   cloudflared Cloudflare Tunnel sidecar — exposes the site publicly with no
#               ports forwarded on your router.
#
# TrueNAS: paste this YAML, then replace ${CLOUDFLARE_TUNNEL_TOKEN} below with
# your actual tunnel token (the long "eyJ..." string). TrueNAS does not read a
# .env file, so the token must be inline there.
#
# Plain docker compose (CLI): put CLOUDFLARE_TUNNEL_TOKEN in a .env file next to
# this compose (see .env.example) and run `docker compose up -d`.
#
# After the cloudflared container connects, the tunnel shows HEALTHY in
# Cloudflare Zero Trust → Networks → Tunnels. Add a Public Hostname pointing at
# the service:  HTTP → web:8080
#
# Don't want the tunnel (terminating TLS elsewhere)? Delete the cloudflared
# service and reach the site on the published port below.

services:
  web:
    image: ghcr.io/nerdspar/aivilo-website:latest
    container_name: aivilo-website
    restart: unless-stopped
    # Optional: publish to the host for LAN access / testing. The cloudflared
    # sidecar does NOT need this — it reaches `web` over the internal network.
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: aivilo-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # TrueNAS: replace the whole ${...} with your literal token.
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN in .env or paste the token here}
    depends_on:
      - web
