# Aivilo website — nginx (runs unprivileged, listens on 8080)
#
# NOTE on headers: nginx `add_header` does NOT inherit into a location that
# declares its own `add_header`. To keep the security headers below applied to
# EVERY response, cache control here uses the `expires` directive (separate
# mechanism) instead of a per-location `add_header Cache-Control`.
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # --- Security headers (apply to every response) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; form-action 'self'" always;

    # --- Compression ---
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/xml application/rss+xml
                      application/manifest+json;

    # --- Health check (for Docker / TrueNAS / uptime probes) ---
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # --- Long-cache static assets (7 days) ---
    location ~* \.(?:css|js|svg|png|jpe?g|gif|ico|webp|woff2?|map)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # --- sitemap / robots: short cache ---
    location = /sitemap.xml { expires 1h; }
    location = /robots.txt  { expires 1h; }

    # --- Clean URLs: /platform -> /platform/index.html.
    #     HTML revalidates each request so deploys show up immediately. ---
    location / {
        expires -1;
        try_files $uri $uri/ =404;
    }

    # --- Custom 404 page ---
    error_page 404 /404.html;
    location = /404.html { internal; }
}
